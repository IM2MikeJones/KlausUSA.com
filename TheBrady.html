---
title: Project Detail - Klaus Multiparking
description: Project Detail - Klaus Multiparking
navActive: projects
projectLoader: true
---
{% extends "layout.njk" %}

{% block content %}
  <div class="m3-product-detail">
    <div class="m3-product-detail__container">
      <div class="m3-product-detail__grid">
        <div class="m3-product-detail__image">
          <img id="project-header-image" src="" alt="" class="m3-product-detail__img">
        </div>
        <div class="m3-product-detail__info">
          <div class="m3-product-detail__title">
            <div id="project-name"></div>
            <div id="project-city" style="margin-top: 0.5rem; font-size: 1.25rem; font-weight: 400; color: var(--md-sys-color-on-surface-variant);"></div>
          </div>
        </div>
      </div>

      <div class="m3-product-detail__description" id="project-description"></div>

      <div class="m3-product-detail__cards-grid">
        <div class="m3-product-detail__card">
          <h2 class="m3-product-detail__card-title">Project Details</h2>
          <div class="m3-product-detail__specs">
            <div class="m3-product-detail__spec-item">
              <span class="m3-product-detail__spec-label">Installed</span>
              <span class="m3-product-detail__spec-value" id="project-installed-date"></span>
            </div>
            <div class="m3-product-detail__spec-item">
              <span class="m3-product-detail__spec-label">City</span>
              <span class="m3-product-detail__spec-value" id="project-city-detail"></span>
            </div>
            <div class="m3-product-detail__spec-item">
              <span class="m3-product-detail__spec-label">Stalls</span>
              <span class="m3-product-detail__spec-value" id="project-stalls"></span>
            </div>
            <div class="m3-product-detail__spec-item">
              <span class="m3-product-detail__spec-label">Model</span>
              <span class="m3-product-detail__spec-value" id="project-model"></span>
            </div>
          </div>
        </div>

        <div class="m3-project-gallery-wrapper">
          <div class="m3-project-gallery">
            <div class="m3-project-gallery__container">
              <div class="m3-project-gallery__slides" id="carousel-slides"></div>
              <button class="m3-project-gallery__prev" aria-label="Previous image">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <polyline points="15 18 9 12 15 6"></polyline>
                </svg>
              </button>
              <button class="m3-project-gallery__next" aria-label="Next image">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <polyline points="9 18 15 12 9 6"></polyline>
                </svg>
              </button>
            </div>
            <div class="m3-project-gallery__indicators" id="carousel-indicators"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Pre-footer Image -->
  <img class="m3-footer__pre-image" src="assets/img/P&Scropped.svg" alt="">
{% endblock %}
